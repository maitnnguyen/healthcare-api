services:
  - type: web
    name: healthcare-api
    runtime: python
    buildCommand: pip install numpy==1.26.4 && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.18
    healthCheckPath: /health
